<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<title>Ürün Düzenle</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="content">

<h1>✏️ Ürün Düzenle</h1>

<form method="POST">

<label>Ürün Adı</label>

<input type="text" name="urun_adi" value="{{ urun[1] }}" required>

<label>Kategori</label>

<input type="text" name="kategori" value="{{ urun[2] }}" required>

<label>Stok</label>

<input type="number" name="stok" value="{{ urun[3] }}" required>

<label>Kritik Seviye</label>

<input type="number" name="kritik" value="{{ urun[4] }}" required>

<br><br>

<button type="submit">💾 Kaydet</button>

</form>

</div>

</body>

</html>
