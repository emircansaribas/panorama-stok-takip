<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<title>Stok Ekle</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>


<body>

<div class="content">

<h1>🟢 Stok Ekle</h1>

<br>


<form method="POST">


<label>Ürün Seç</label>

<br>

<select name="urun_id">

{% for urun in urunler %}

<option value="{{ urun[0] }}">
{{ urun[1] }}
</option>

{% endfor %}

</select>


<br><br>


<label>Eklenecek Miktar</label>

<br>

<input type="number" name="miktar" required>


<br><br>


<button type="submit">

Stok Ekle

</button>


</form>


</div>

</body>

</html>
