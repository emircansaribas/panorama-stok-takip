<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eklenen Stoklar</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


<style>

table{

width:100%;
background:white;
border-collapse:collapse;

}


th{

background:#16a34a;
color:white;
padding:12px;

}


td{

padding:12px;
text-align:center;
border-bottom:1px solid #ddd;

}


.eklenen{

color:green;
font-weight:bold;

}

</style>

</head>


<body>


<div class="content">


<h1>🟢 Eklenen Stoklar</h1>

<br>


<table>


<tr>

<th>Tarih</th>

<th>Ürün</th>

<th>Miktar</th>

<th>Kullanıcı</th>

</tr>



{% for hareket in hareketler %}


<tr>


<td>
{{ hareket[3] }}
</td>


<td>
{{ hareket[6] }}
</td>


<td class="eklenen">

+ {{ hareket[2] }}

</td>


<td>
{{ hareket[5] }}
</td>


</tr>


{% endfor %}



</table>


</div>


</body>


</html>
